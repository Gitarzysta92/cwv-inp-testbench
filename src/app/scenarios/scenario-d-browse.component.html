<main class="sdb" data-testid="scenario-d-browse">
  <h1>Scenario D — browse</h1>
  @if (error()) {
    <p data-testid="browse-error">{{ error() }}</p>
  } @else {
    <ul class="sdb__list">
      @for (item of items(); track item.id) {
        <li class="sdb__row">
          <span>{{ item.name }}</span>
          @if ($first) {
            <button type="button" data-testid="add-first-product" (click)="addFirst()">
              Add
            </button>
          } @else {
            <button
              type="button"
              [attr.data-testid]="'add-product-' + item.id"
              (click)="addFirst()"
            >
              Add
            </button>
          }
        </li>
      }
    </ul>
    <p>
      <a data-testid="open-cart" routerLink="/scenario/d/cart">Open cart</a>
    </p>
  }
</main>
