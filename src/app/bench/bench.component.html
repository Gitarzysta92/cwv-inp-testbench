<main class="bench" data-testid="bench-root">
  <h1 class="bench__title">CWV bench</h1>

  @if (loadError(); as err) {
    <p class="bench__error" data-testid="load-error">{{ err }}</p>
  } @else {
    <section class="bench__filters" aria-label="Category filters">
      <button
        type="button"
        class="bench__chip"
        data-testid="filter-all"
        [attr.aria-pressed]="category() === 'all'"
        (click)="setCategory('all')"
      >
        All
      </button>
      <button
        type="button"
        class="bench__chip"
        data-testid="filter-electronics"
        [attr.aria-pressed]="category() === 'electronics'"
        (click)="setCategory('electronics')"
      >
        Electronics
      </button>
      <button
        type="button"
        class="bench__chip"
        data-testid="filter-home"
        [attr.aria-pressed]="category() === 'home'"
        (click)="setCategory('home')"
      >
        Home
      </button>
    </section>

    <label class="bench__search">
      <span class="bench__label">Search</span>
      <input
        type="search"
        class="bench__input"
        data-testid="search-input"
        [ngModel]="searchQuery()"
        (ngModelChange)="updateSearch($event)"
        autocomplete="off"
        spellcheck="false"
      />
    </label>

    <ul class="bench__list" data-testid="item-list">
      @for (item of filteredItems(); track item.id) {
        <li class="bench__item" [attr.data-item-id]="item.id">
          <span class="bench__name">{{ item.name }}</span>
          <span class="bench__price">{{ item.price | currency }}</span>
        </li>
      }
    </ul>

    <section class="bench__cart" aria-label="Cart">
      <button
        type="button"
        class="bench__primary"
        data-testid="add-to-cart"
        (click)="addToCart()"
      >
        Add to cart
      </button>
      <div class="bench__qty" data-testid="cart-qty">
        Qty: {{ cartQty() }}
      </div>
      <button
        type="button"
        class="bench__secondary"
        data-testid="cart-minus"
        (click)="bumpCart(-1)"
      >
        −1
      </button>
      <button
        type="button"
        class="bench__secondary"
        data-testid="cart-plus"
        (click)="bumpCart(1)"
      >
        +1
      </button>
    </section>
  }
</main>
